name: " - Wheel (Linux / CUDA)"

on:
  workflow_call:
    inputs:
      os_build:
        required: true
        type: string
      os_test:
        required: true
        type: string
      container:
        required: true
        type: string
      arch:
        required: true
        type: string
      python-version:
        required: true
        type: string
      cuda-version:
        required: true
        type: string
      run-test:
        required: false
        default: 'false'
        type: string

env:
  ARTIFACT: wheel-linux-py${{ inputs.python-version }}-cuda${{ inputs.cuda-version }}
  SPDL_USE_TRACING: 1
  SPDL_BUILD_STUB: 0
  SPDL_USE_CUDA: 1

jobs:
  build:
    runs-on: "${{ inputs.os_build }}"
    container: "${{ inputs.container }}"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build
        run: |
          set -ex

          # Quick sanity check
          nvcc --version

          # We need zlib, which is usually found by default,
          # but this custom docker does not have one in locations
          # that are managed by the OS package manager.
          #
          # Conda has one so we use it.
          # $ find / -name zlib.h -type f
          # /opt/conda/include/zlib.h
          export PATH="${PATH}:/opt/conda/"
          
          wget -qO- https://astral.sh/uv/install.sh | sh
          source $HOME/.local/bin/env
          uv python list --only-installed

          # note: 3.13t is in cp313-cp313t directory, others are in cp313-cp313 directory
          v=${{ inputs.python-version }}
          dir="cp${v//[.t]/}-cp${v//[.]/}"
          python_exe="/opt/python/${dir}/bin/python"
          uv venv --python "${python_exe}"
          uv build --all-packages --wheel

          ./packaging/repair_wheels.sh "manylinux_2_27_${{ inputs.arch }}" ./dist ~/package

      - uses: actions/upload-artifact@v4
        name: Upload build artifact
        with:
          name: "${{ env.ARTIFACT }}"
          path: ~/package
          if-no-files-found: error
          retention-days: 7
          overwrite: true

      - name: Check package
        # CFFI is not available yet for 3.13t, which prevents the installation of twine
        # https://github.com/python-cffi/cffi/releases/tag/v1.17.0
        if: ${{ inputs.python-version != '3.13t' }}
        run: |
          # note: 3.13t is in cp313-cp313t directory, others are in cp313-cp313 directory
          v=${{ inputs.python-version }}
          dir="cp${v//[.t]/}-cp${v//[.]/}"
          python_exe="/opt/python/${dir}/bin/python"
          "${python_exe}" -m pip install -r ./packaging/requirements.txt
          "${python_exe}" -m twine check --strict ~/package/*.whl

  test:
    if: ${{ inputs.run-test == 'true' }}
    needs: ["build"]
    name: "test ffmpeg"
    strategy:
      fail-fast: false
      matrix:
        ffmpeg-version: ["5", "6", "7" ]
    runs-on: "${{ inputs.os_test }}"
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          name: "${{ env.ARTIFACT }}"
          path: ~/package

      - uses: conda-incubator/setup-miniconda@v3
        if: ${{ inputs.python-version != '3.13t' }}
        with:
          python-version: ${{ inputs.python-version }}
          conda-remove-defaults: "true"

      - uses: conda-incubator/setup-miniconda@v3
        if: ${{ inputs.python-version == '3.13t' }}
        with:
          python-version: '3.13'
          conda-remove-defaults: "true"

      - name: Unit test
        run: |
          if [[ "${{ inputs.python-version }}" == '3.13t' ]]; then
            conda install -q -c conda-forge python-freethreading
          fi
          
          # Install SPDL
          pip install $(find "${HOME}/package" -name '*.whl' -depth -maxdepth 1)

          # Install PyTorch and others
          pip install pytest
          pip install numpy nvidia-cuda-runtime-cu12 torch --index-url https://download.pytorch.org/whl/cu126

          # Install FFmpeg
          conda install -q -c conda-forge "ffmpeg==${{ matrix.ffmpeg-version }}"
          # For some reason, the FFmpeg dynamic libraries are not found.
          export "LD_LIBRARY_PATH=${CONDA_PREFIX}/lib"
          # TODO: clean up the logic for versions

          # Run test
          pytest -v \
              tests/spdl_unittest/cuda/ \
              tests/spdl_unittest/io/
